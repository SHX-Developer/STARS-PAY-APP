# nginx config для статики StarsPay Mini App
# Обращения к /api и /avatars проксируются на сервис api в той же docker-сети.

server {
    listen      80 default_server;
    server_name _;

    # Docker embedded DNS — без него nginx резолвит upstream-имя ОДИН раз при
    # старте и кеширует навсегда. Когда api-контейнер пересобирается и получает
    # новый IP — nginx стучится в мёртвый и отдаёт 502. С resolver + переменной
    # в proxy_pass nginx переразрешает имя на каждый запрос.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Безопасность
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Telegram Mini App требует, чтобы CSP не блокировал telegram.org
    add_header Content-Security-Policy "default-src 'self' https://telegram.org https://*.telegram.org; img-src 'self' data: https: blob:; script-src 'self' 'unsafe-inline' https://telegram.org; style-src 'self' 'unsafe-inline'; connect-src 'self' https:; font-src 'self' data:;" always;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    root /usr/share/nginx/html;
    index index.html;

    # Кэшируем хешированные ассеты Vite надолго
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API → Fastify
    location /api/ {
        set $api_upstream api;
        proxy_pass http://$api_upstream:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Аватарки → Fastify (отдаются с диска бэка)
    location /avatars/ {
        set $api_upstream api;
        proxy_pass http://$api_upstream:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1d;
        add_header Cache-Control "public";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
