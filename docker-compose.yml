# =====================================================
# docker-compose.yml — StarsPay
# Готов для деплоя в Dokploy (тип проекта: Docker Compose).
#
# БД здесь НЕ описана — используется отдельный сервис PostgreSQL,
# созданный в Dokploy (Project → Create → Database → PostgreSQL).
# Передайте его "Internal Connection URL" в переменную DATABASE_URL.
#
# Dokploy подхватит сервис `web` как entrypoint и обернёт его в Traefik
# (домен и SSL настраиваются в UI Dokploy).
# =====================================================

services:
  # -----------------------------
  # API (Fastify + Prisma)
  # -----------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      # Internal Connection URL из Dokploy-Postgres + ?schema=public
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required (возьмите Internal Connection URL у Dokploy-Postgres и добавьте ?schema=public)}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      TELEGRAM_AUTH_TTL: ${TELEGRAM_AUTH_TTL:-86400}
      # Юзернейм бота без @ (например `starspay_bot`) — нужен для реф-ссылок
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      # Короткое имя Mini App из BotFather `/newapp` (например `app`)
      TELEGRAM_MINIAPP_NAME: ${TELEGRAM_MINIAPP_NAME:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      AVATAR_DIR: /app/data/avatars
      AVATAR_PUBLIC_PREFIX: /avatars
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - api-avatars:/app/data/avatars
    networks:
      # default — чтобы web мог ходить на http://api:4000
      - default
      # dokploy-network — чтобы api видел отдельный Postgres-сервис Dokploy по его internal host
      - dokploy-network
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/health']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    # порт api не публикуется — nginx ходит к нему по docker-сети как http://api:4000

  # -----------------------------
  # Web (статика + nginx-прокси на api)
  # -----------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Пустая строка → фронт ходит на same-origin через nginx (рекомендуется)
        VITE_API_BASE: ${VITE_API_BASE:-}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - '80'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/']
      interval: 30s
      timeout: 5s
      retries: 5
    # В Dokploy: задайте домен для сервиса `web` через UI — Traefik автоматически
    # выпишет SSL и направит трафик. Никаких labels вручную писать не нужно.

volumes:
  api-avatars:

networks:
  # внешняя shared-сеть Dokploy (создаётся самим Dokploy)
  dokploy-network:
    external: true
