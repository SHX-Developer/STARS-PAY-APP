# =====================================================
# docker-compose.yml — StarsPay
# Готов для деплоя в Dokploy (тип проекта: Docker Compose).
#
# БД здесь НЕ описана — используется отдельный сервис PostgreSQL,
# созданный в Dokploy (Project → Create → Database → PostgreSQL).
# Передайте его "Internal Connection URL" в переменную DATABASE_URL.
#
# Dokploy подхватит сервис `web` как entrypoint и обернёт его в Traefik
# (домен и SSL настраиваются в UI Dokploy).
# =====================================================

services:
  # -----------------------------
  # API (Fastify + Prisma)
  # -----------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      # Internal Connection URL из Dokploy-Postgres + ?schema=public
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required (возьмите Internal Connection URL у Dokploy-Postgres и добавьте ?schema=public)}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      TELEGRAM_AUTH_TTL: ${TELEGRAM_AUTH_TTL:-86400}
      # Юзернейм бота без @ (например `starspay_bot`) — нужен для реф-ссылок
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      # Короткое имя Mini App из BotFather `/newapp` (например `app`)
      TELEGRAM_MINIAPP_NAME: ${TELEGRAM_MINIAPP_NAME:-}
      # Webhook-секрет (`openssl rand -hex 32`). Без него /telegram/webhook отключен.
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      # Полный webhook URL. Обычно можно не задавать: соберётся из TELEGRAM_WEBAPP_URL.
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      # Публичный URL Mini App для inline-button web_app (например https://app.example.com)
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL:-}
      # URL приветственной картинки (любой публичный image-URL)
      WELCOME_IMAGE_URL: ${WELCOME_IMAGE_URL:-}
      # Канал для админов — куда падают новые заказы
      TELEGRAM_ORDER_CHANNEL: ${TELEGRAM_ORDER_CHANNEL:-}
      TELEGRAM_API_TIMEOUT_MS: ${TELEGRAM_API_TIMEOUT_MS:-10000}
      # Buypin lookup API
      EXTERNAL_API_BASE_URL: ${EXTERNAL_API_BASE_URL:-}
      EXTERNAL_API_KEY: ${EXTERNAL_API_KEY:-}
      BUYPIN_GAME_KEY: ${BUYPIN_GAME_KEY:-}
      BUYPIN_PREMIUM_GAME_KEY: ${BUYPIN_PREMIUM_GAME_KEY:-}
      # S3 (Yandex Cloud Object Storage)
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-}
      AWS_S3_FORCE_PATH_STYLE: ${AWS_S3_FORCE_PATH_STYLE:-true}
      AWS_S3_PUBLIC_BASE: ${AWS_S3_PUBLIC_BASE:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      AVATAR_DIR: /app/data/avatars
      AVATAR_PUBLIC_PREFIX: /avatars
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - api-avatars:/app/data/avatars
    networks:
      # default — чтобы web мог ходить на http://api:4000
      - default
      # dokploy-network — чтобы api видел отдельный Postgres-сервис Dokploy по его internal host
      - dokploy-network
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/health']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    # порт api не публикуется — nginx ходит к нему по docker-сети как http://api:4000

  # -----------------------------
  # Web (статика + nginx-прокси на api)
  # -----------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Пустая строка → фронт ходит на same-origin через nginx (рекомендуется)
        VITE_API_BASE: ${VITE_API_BASE:-}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - '80'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/']
      interval: 30s
      timeout: 5s
      retries: 5
    # В Dokploy: задайте домен для сервиса `web` через UI — Traefik автоматически
    # выпишет SSL и направит трафик. Никаких labels вручную писать не нужно.

volumes:
  api-avatars:

networks:
  # внешняя shared-сеть Dokploy (создаётся самим Dokploy)
  dokploy-network:
    external: true
