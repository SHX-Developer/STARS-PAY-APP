# =====================================================
# docker-compose.yml — StarsPay
# Готов для деплоя в Dokploy (тип проекта: Docker Compose).
# Dokploy сам подхватит сервис `web` как entrypoint и обернёт его в Traefik
# (домен и SSL настраиваются в UI Dokploy на конкретный сервис).
# =====================================================

services:
  # -----------------------------
  # PostgreSQL
  # -----------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-starspay}
      POSTGRES_USER: ${POSTGRES_USER:-starspay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-starspay} -d ${POSTGRES_DB:-starspay}']
      interval: 10s
      timeout: 5s
      retries: 10
    # порт намеренно НЕ публикуется наружу — БД доступна только внутри docker-сети

  # -----------------------------
  # API (Fastify + Prisma)
  # -----------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-starspay}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-starspay}?schema=public
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      TELEGRAM_AUTH_TTL: ${TELEGRAM_AUTH_TTL:-86400}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      AVATAR_DIR: /app/data/avatars
      AVATAR_PUBLIC_PREFIX: /avatars
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - api-avatars:/app/data/avatars
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/health']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    # порт api не публикуется — nginx ходит к нему по docker-сети как http://api:4000

  # -----------------------------
  # Web (статика + nginx-прокси на api)
  # -----------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Пустая строка → фронт ходит на same-origin через nginx (рекомендуется)
        VITE_API_BASE: ${VITE_API_BASE:-}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - '80'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/']
      interval: 30s
      timeout: 5s
      retries: 5
    # В Dokploy: задайте домен для сервиса `web` через UI — Traefik автоматически
    # выпишет SSL и направит трафик. Никаких labels вручную писать не нужно.
    # Для локального запуска можно раскомментировать:
    # ports:
    #   - "8080:80"

volumes:
  db-data:
  api-avatars:
